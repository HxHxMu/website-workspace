
  <!-- ═══════════════════════════════════════════════
       HERO
  ═══════════════════════════════════════════════ -->
  <section id="hero" class="grain relative min-h-screen hero-gradient flex flex-col justify-end overflow-hidden">

    <!-- Parallax atmospheric layer -->
    <div id="hero-parallax" class="absolute inset-0 pointer-events-none will-change-transform">
      <div class="absolute inset-0"
           style="background:
             radial-gradient(ellipse 65% 52% at 78% 64%, rgba(224,92,40,0.34) 0%, transparent 50%),
             radial-gradient(ellipse 38% 32% at 94% 88%, rgba(165,52,18,0.20) 0%, transparent 46%),
             radial-gradient(ellipse 50% 40% at 12% 88%, rgba(95,38,12,0.10) 0%, transparent 52%);"></div>
    </div>

    <!-- Abstract visual form — right side atmospheric orb -->
    <div class="absolute right-0 top-0 w-1/2 h-full pointer-events-none overflow-hidden">
      <!-- Primary orb -->
      <div style="
        position: absolute;
        top: 12%;
        right: -8%;
        width: 72%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: radial-gradient(circle at 38% 42%,
          rgba(224,92,40,0.22) 0%,
          rgba(180,60,18,0.14) 30%,
          rgba(100,28,8,0.06) 60%,
          transparent 75%);
        filter: blur(38px);
      "></div>
      <!-- Secondary orb — cooler offset -->
      <div style="
        position: absolute;
        top: 38%;
        right: 5%;
        width: 44%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 50%,
          rgba(200,130,60,0.12) 0%,
          transparent 68%);
        filter: blur(52px);
      "></div>
      <!-- Faint horizon line -->
      <div style="
        position: absolute;
        bottom: 28%;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(224,92,40,0.18), transparent);
      "></div>
    </div>

    <!-- Dot grid — faint structural texture -->
    <div class="absolute inset-0 pointer-events-none" style="
      background-image: radial-gradient(circle, rgba(242,240,235,0.07) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(ellipse 80% 80% at 70% 50%, rgba(0,0,0,0.5) 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 70% 50%, rgba(0,0,0,0.5) 0%, transparent 70%);
    "></div>

    <!-- Scroll-fade overlay -->
    <div id="hero-fade" class="absolute inset-0 bg-ink pointer-events-none" style="opacity: 0;"></div>

    <!-- Nav spacer -->
    <div class="h-24 shrink-0"></div>

    <!-- Content -->
    <div class="relative z-10 mx-auto max-w-7xl px-6 md:px-10 w-full pb-24 md:pb-36">

      <p class="text-xs uppercase tracking-label text-warm-muted mb-10 reveal">
        Senior Product Designer · Creative Technologist
      </p>

      <h1 class="font-bold text-warm-white leading-[0.88] reveal reveal-delay-1"
          style="font-size: clamp(72px, 13vw, 168px); letter-spacing: -0.035em;">
        Luis E.<br>Bonilla.
      </h1>

      <div class="mt-16 flex flex-col md:flex-row md:items-end gap-8 md:gap-24 reveal reveal-delay-2">
        <p class="max-w-sm text-base md:text-lg leading-relaxed text-warm-muted font-light" style="letter-spacing: 0.005em;">
          Product UX, visual systems, and AI-native workflows —
          designed with conviction.
        </p>
        <a href="#work"
           class="group shrink-0 self-start flex items-center gap-3 text-sm text-warm-white border border-warm-white/20 px-7 py-3.5 rounded-full hover:border-warm-white/45 hover:bg-warm-white/5 transition-all duration-400">
          View Work
          <span class="group-hover:translate-x-1 transition-transform duration-300 inline-block">→</span>
        </a>
      </div>

      <!-- Discipline tags -->
      <div class="mt-12 flex flex-wrap gap-2.5 reveal reveal-delay-3">
        <span class="discipline-tag">UX / Product</span>
        <span class="discipline-tag">Design Systems</span>
        <span class="discipline-tag">AI Workflows</span>
        <span class="discipline-tag">Prototyping</span>
        <span class="discipline-tag">Creative Technology</span>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center opacity-30 pointer-events-none">
      <div class="w-px h-14 bg-warm-white/50 animate-scroll-line"></div>
    </div>
  </section>
