
  <!-- ═══════════════════════════════════════════════
       HERO
  ═══════════════════════════════════════════════ -->
  <section id="hero" data-orb-field="hero" data-orb-palette="blue" data-orb-mode="hero-tabs" class="grain orb-field orb-field--hero relative min-h-screen hero-gradient flex flex-col justify-center overflow-hidden">

    <!-- Parallax atmospheric layer (JS transforms the wrapper, gradient is CSS) -->
    <div id="hero-parallax" class="absolute inset-0 pointer-events-none will-change-transform">
      <div class="absolute inset-0 atmo-hero"></div>
    </div>

    <!-- Dot grid — faint structural texture -->
    <div class="absolute inset-0 pointer-events-none hero-dot-grid"></div>

    <!-- Ambient gradient orbs — above parallax layer -->
    <div class="orb-field__orb orb-field__orb--a"></div>
    <div class="orb-field__orb orb-field__orb--b"></div>
    <div class="orb-field__orb orb-field__orb--c"></div>


    <!-- Scroll-fade overlay (JS-driven opacity) -->
    <div id="hero-fade" class="absolute inset-0 bg-ink pointer-events-none" style="opacity: 0;"></div>

    <!-- Content: full-width editorial statement -->
    <div class="rail-clear relative z-10 mx-auto max-w-7xl px-6 md:px-10 w-full py-20 md:py-32 flex-1 flex flex-col justify-center">

      <!-- Audience selector -->
      <div class="audience-strip reveal mb-10 md:mb-14">
        <div class="audience-tabs flex flex-wrap gap-2">
          <button class="audience-tab audience-tab--active text-xs font-medium uppercase tracking-label px-4 py-2 border rounded-full transition-all duration-300 bg-warm-white/05 text-warm-white border-warm-white/35" data-audience="anyone" data-color="blue">For Anyone</button>
          <button class="audience-tab text-xs font-medium uppercase tracking-label px-4 py-2 border rounded-full transition-all duration-300 bg-transparent text-warm-muted border-warm-white/12 hover:border-warm-white/35 hover:text-warm-white hover:bg-warm-white/05" data-audience="recruiters" data-color="teal">Recruiters</button>
          <button class="audience-tab text-xs font-medium uppercase tracking-label px-4 py-2 border rounded-full transition-all duration-300 bg-transparent text-warm-muted border-warm-white/12 hover:border-warm-white/35 hover:text-warm-white hover:bg-warm-white/05" data-audience="directors" data-color="violet">Design Directors</button>
          <button class="audience-tab text-xs font-medium uppercase tracking-label px-4 py-2 border rounded-full transition-all duration-300 bg-transparent text-warm-muted border-warm-white/12 hover:border-warm-white/35 hover:text-warm-white hover:bg-warm-white/05" data-audience="designers" data-color="warm">Product Designers</button>
          <button class="audience-tab text-xs font-medium uppercase tracking-label px-4 py-2 border rounded-full transition-all duration-300 bg-transparent text-warm-muted border-warm-white/12 hover:border-warm-white/35 hover:text-warm-white hover:bg-warm-white/05" data-audience="pms" data-color="teal">Product Managers</button>
          <button class="audience-tab text-xs font-medium uppercase tracking-label px-4 py-2 border rounded-full transition-all duration-300 bg-transparent text-warm-muted border-warm-white/12 hover:border-warm-white/35 hover:text-warm-white hover:bg-warm-white/05" data-audience="engineers" data-color="blue">Engineers</button>
          <button class="audience-tab text-xs font-medium uppercase tracking-label px-4 py-2 border rounded-full transition-all duration-300 bg-transparent text-warm-muted border-warm-white/12 hover:border-warm-white/35 hover:text-warm-white hover:bg-warm-white/05" data-audience="creative-ai" data-color="violet">Creative / AI</button>
        </div>
      </div>

      <!-- Headline — swaps per audience -->
      <h1 id="hero-headline" class="heading-hero font-bold text-warm-white max-w-5xl reveal reveal-delay-1">
        Designer who makes complex things feel clear, alive, and worth using.
      </h1>

      <p id="hero-sub" class="mt-10 text-base md:text-lg text-warm-muted leading-relaxed max-w-md reveal reveal-delay-2">
        Product design &middot; creative technology &middot; AI workflows.<br>
        Disney &middot; Citrix &middot; Life Force Academy.
      </p>

    </div>

    <!-- Scroll indicator -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center opacity-30 pointer-events-none">
      <div class="w-px h-14 bg-warm-white/50 animate-scroll-line"></div>
    </div>
  </section>
