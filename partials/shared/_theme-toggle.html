  <!-- ═══════════════════════════════════════════════
       THEME TOGGLE
  ═══════════════════════════════════════════════ -->
  <button
    id="theme-toggle"
    class="theme-toggle"
    type="button"
    aria-label="Switch to light mode">
    <span class="theme-toggle__track" aria-hidden="true">
      <span class="theme-toggle__thumb">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4.25"></circle>
          <path d="M12 2.75v2.2"></path>
          <path d="M12 19.05v2.2"></path>
          <path d="M5.46 5.46l1.55 1.55"></path>
          <path d="M17 17l1.54 1.54"></path>
          <path d="M2.75 12h2.2"></path>
          <path d="M19.05 12h2.2"></path>
          <path d="M5.46 18.54l1.55-1.55"></path>
          <path d="M17 7l1.54-1.54"></path>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.2 14.3A7.75 7.75 0 1 1 9.7 3.8a6.35 6.35 0 0 0 10.5 10.5Z"></path>
        </svg>
      </span>
    </span>
  </button>
